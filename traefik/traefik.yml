# Traefik reference configuration
# In production, CLI args in docker-compose.yml take precedence.

api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: captainhook-net

